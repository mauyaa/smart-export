name: SmartExports CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest requests

      - name: Warm up Render instance
        run: |
          echo "Waking up Render free tier instance..."
          curl --retry 5 --retry-delay 15 --retry-connrefused \
            -o /dev/null -s -w "%{http_code}" \
            ${{ secrets.API_BASE_URL }}/health || true
          sleep 60

      - name: Run smoke tests against deployed API
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 api/main.py \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,E402,E131 \
            --count

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: front-end
        # package-lock.json was generated on Windows and is missing the
        # resolved entry for the Linux rolldown native binding, which makes
        # npm silently skip installing it (npm/cli#4828). Regenerating the
        # lockfile from scratch here forces npm to resolve the correct
        # platform binding instead of trusting the stale lock entries.
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Lint
        working-directory: front-end
        run: npm run lint

      - name: Type-check
        working-directory: front-end
        run: npx tsc --noEmit

      - name: Build
        working-directory: front-end
        run: npm run build
